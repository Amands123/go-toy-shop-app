<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Kids Toy Shop</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom right, #eef7f7, #dff1f1);
            color: #2c3e50;
        }

        /* Navbar */

        .navbar {
            background-color: white;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo img {
            width: 60px;
            border-radius: 10px;
        }

        .logo-text h2 {
            color: #ff4d6d;
            font-size: 34px;
        }

        .logo-text p {
            color: #27ae60;
            font-size: 20px;
            font-weight: bold;
        }

        .nav-links a {
            margin-left: 25px;
            text-decoration: none;
            color: #2c3e50;
            font-size: 20px;
            font-weight: bold;
        }

        .nav-links a:hover {
            color: #16a085;
        }

        /* Hero Section */

        .hero {
            text-align: center;
            padding: 60px 20px 30px;
        }

        .hero h1 {
            font-size: 70px;
            color: #0b2c66;
            margin-bottom: 15px;
        }

        .hero h2 {
            font-size: 65px;
            color: #16a085;
        }

        .divider {
            width: 300px;
            height: 4px;
            background-color: #6dd5d5;
            margin: 30px auto;
            border-radius: 5px;
        }

        /* Cards */

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 35px;
            padding: 30px 40px 80px;
        }

        .card {
            width: 280px;
            background-color: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 15px;
        }

        .card h2 {
            margin-top: 20px;
            font-size: 36px;
            color: #1b3c73;
        }

        .card button {
            margin-top: 20px;
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            background-color: #2ecc71;
            color: white;
            font-size: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .card button:hover {
            background-color: #27ae60;
        }

        /* Footer */

        footer {
            background-color: #dff1f1;
            text-align: center;
            padding: 35px 20px;
            border-top: 1px solid #b8dede;
        }

        footer h3 {
            font-size: 32px;
            color: #1b3c73;
            margin-bottom: 15px;
        }

        footer p {
            font-size: 22px;
            margin-bottom: 10px;
            color: #34495e;
        }

        footer span {
            color: #16a085;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <!-- Navbar -->

    <div class="navbar">

        <div class="logo">

            <img src="/static/images/teddy.jpg" alt="Logo">

            <div class="logo-text">
                <h2>Happy Kids</h2>
                <p>Toy Shop</p>
            </div>

        </div>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/cart">Cart</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
        </div>

    </div>

    <!-- Hero Section -->

    <div class="hero">

        <h1>Welcome to</h1>
        <h2>Happy Kids Toy Shop</h2>

        <div class="divider"></div>

    </div>

    <!-- Product Categories -->

    <div class="container">

        {{range .}}

        <div class="card">

            <img src="{{.Image}}" alt="{{.Name}}">

            <h2>{{.Name}}</h2>

            <a href="/toys?category={{.Name}}">
                <button>View Products</button>
            </a>

        </div>

        {{end}}

    </div>

    <!-- Footer -->

    <footer>

        <h3>Created By: <span>Aman Agarwal</span></h3>

        <p>Contact: <span>agraman1994@gmail.com</span></p>

    </footer>

</body>

</html>
